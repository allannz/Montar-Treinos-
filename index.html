<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Bem-vindo - Personal Trainer</title>

  <style>
body {
  margin: 0;
  font-family: Arial;

  min-height: 100vh;

  background: #313238; /* só cor agora */

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

  padding: 40px 0;
}

/* CONTAINER PRINCIPAL */
.wrapper {
  width: 90%;
  max-width: 1200px;

  min-height: 500px;

  display: flex;

  border-radius: 20px;
  overflow: hidden;

  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);

  /* 👇 IMAGEM AQUI */
  background-image: 
    linear-gradient(rgba(49, 50, 56, 0.3), rgba(49, 50, 56, 0.3)),
    url("img/academia.jpg");

  background-size: cover;
  background-position: center;
}

/* LADO ESQUERDO (FORM) */
.form-box {
  width: 50%;
  padding: 40px;

  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;

  background: rgba(255, 255, 255, 0.95); /* 👈 destaque no form */
}

.form-box h1 {
  color: #007bff;
  margin-bottom: 20px;
}

/* INPUT */
input {
  width: 85%;
  padding: 12px;
  margin: 15px auto;

  display: block;

  border-radius: 100px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* BOTÃO */
.btn {
  display: block;
  width: fit-content;

  padding: 10px 25px;
  margin: 10px auto 0;

  background: #007bff;
  color: #fff;
  text-decoration: none;

  border-radius: 100px;
  transition: 0.2s;
}

.btn:hover {
  background: #0056b3;
  transform: scale(1.05);
}

/* LADO DIREITO (IMAGEM) */
.image-box {
  width: 50%;
  height: auto; /* 👈 acompanha altura do form */
}

.image-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* RESPONSIVO */
@media (max-width: 768px) {
  .wrapper {
    flex-direction: column;
  }

  .form-box,
  .image-box {
    width: 100%;
  }

  .image-box {
    height: 200px; /* altura fixa no mobile */
  }
}
  </style>
</head>

<body>

  <div class="wrapper">

    <!-- FORM -->
    <div class="form-box">
      <h1>Bem-vindo Personal</h1>

      <input type="text" id="nomePersonal" placeholder="Seu nome">

      <a class="btn" href="treino.html" onclick="return validarNome();">
        Continuar
      </a>
    </div>

    <!-- IMAGEM -->
    <div class="image-box">
      <img src="img/fitness.jpg" alt="Imagem fitness">
    </div>

  </div>

  <script>
    function validarNome() {
      const nome = document.getElementById('nomePersonal').value.trim();

      if (!nome) {
        alert('Digite seu nome!');
        return false;
      }

      localStorage.setItem('nomePersonal', nome);
      return true;
    }
  </script>

</body>

</html>
